<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="imc.css">
</head>
<body>
    
<header>
        Insira seu peso (kg) e sua altura (m) para calcular seu IMC
    </header>

    <main>
        <section>
            <h1>IMC</h1>

            <label for="inputA" id="labelDoInputA">Peso (kg)</label>
            <input type="number" id="inputA" placeholder="Ex: 70">

            <label for="inputB">Altura (m)</label>
            <input type="number" id="inputB" placeholder="Ex: 1.75">

            <button onclick="funcaoCalcular()">Calcular</button>

            <div class="resultado">
                <p><strong>IMC:</strong> <span id="resp1">0</span></p>
            </div>
        </section>
    </main>
 <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>

    <script src="imc.js"></script>



</body>
</html>
