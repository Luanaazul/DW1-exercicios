<!DOCTYPE html>
<html lang="en">

   <label for="nota4">Nota 4:</label>

    <label for="mediaexercicios">Média dos Exercícios:</label>

    <br>
    <button onclick="calcular()">Calcular Média</button>
    <br>

    </main>
    <footer>
